<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#070a12">
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
  <title>Game not found — Tiny Arcade</title>
  <style>
    :root { color-scheme: dark; --bg:#070a12; --panel:#11182a; --ink:#f4f7ff; --muted:#aab4cb; --line:rgba(156,176,219,.2); --cyan:#65e6ff; }
    * { box-sizing: border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; padding:24px; color:var(--ink); background:radial-gradient(circle at 50% 10%,rgba(101,230,255,.14),transparent 30rem),var(--bg); font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
    main { width:min(520px,100%); padding:42px; border:1px solid var(--line); border-radius:24px; background:rgba(17,24,42,.82); text-align:center; box-shadow:0 28px 90px rgba(0,0,0,.35); }
    .code { margin:0; color:var(--cyan); font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.8rem; font-weight:800; letter-spacing:.14em; }
    h1 { margin:13px 0 12px; font-size:clamp(2.2rem,8vw,4.5rem); line-height:.92; letter-spacing:-.07em; }
    p { margin:0 auto 25px; max-width:390px; color:var(--muted); line-height:1.65; }
    a { display:inline-flex; min-height:44px; padding:0 16px; border-radius:11px; align-items:center; color:#061019; background:var(--cyan); font-weight:850; text-decoration:none; }
  </style>
</head>
<body>
  <main>
    <p class="code">404 · LEVEL NOT FOUND</p>
    <h1>Wrong portal.</h1>
    <p>This game path does not exist—or it moved while nobody was looking.</p>
    <a href="/single-page-games/">Return to the game library</a>
  </main>
</body>
</html>
