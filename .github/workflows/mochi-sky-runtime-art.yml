name: Build Mochi Sky runtime art

on:
  push:
    branches:
      - fix/mochi-sky-inhale-scene-layers
    paths:
      - games/mochi-sky/tools/generate_runtime_art.py
      - games/mochi-sky/tools/normalize_generated_art.py
      - .github/workflows/mochi-sky-runtime-art.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mochi-sky-inhale-scene-layers

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate runtime assets
        run: |
          python -m pip install --disable-pip-version-check pillow
          python games/mochi-sky/tools/generate_runtime_art.py

      - name: Validate and commit generated assets
        run: |
          git add \
            games/mochi-sky/assets/mochi-sky-inhale-game-sheet.png \
            games/mochi-sky/assets/mochi-sky-backdrop.png \
            games/mochi-sky/assets/mochi-sky-tiles.png
          if git diff --cached --quiet; then
            echo 'Runtime assets are already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Regenerate Mochi Sky runtime art [skip ci]'
          git push origin HEAD:fix/mochi-sky-inhale-scene-layers
