name: Apply Mochi Sky feedback assets

on:
  push:
    branches:
      - 'fix/mochi-sky-*'
      - 'feat/mochi-sky-*'
    paths:
      - games/mochi-sky/tools/generate_runtime_art.py
      - games/mochi-sky/tools/update_runtime_animation.py
      - games/mochi-sky/asset-manifest.json
      - tools/game-assets/validate_game_assets.py
      - .github/workflows/apply-mochi-feedback.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build and validate runtime art
        run: |
          python -m pip install --disable-pip-version-check pillow
          python games/mochi-sky/tools/generate_runtime_art.py
          python tools/game-assets/validate_game_assets.py games/mochi-sky/asset-manifest.json
          python games/mochi-sky/tools/update_runtime_animation.py

      - name: Validate JavaScript syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path('games/mochi-sky/index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/mochi-sky.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/mochi-sky.js

      - name: Commit generated files
        run: |
          git add games/mochi-sky/index.html games/mochi-sky/assets/mochi-sky-inhale-game-sheet.png games/mochi-sky/assets/mochi-sky-backdrop.png games/mochi-sky/assets/mochi-sky-tiles.png
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Polish Mochi Sky animation formatting'
          git push origin HEAD:${{ github.ref_name }}
