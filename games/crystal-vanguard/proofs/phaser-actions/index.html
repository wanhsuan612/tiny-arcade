<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Crystal Vanguard Phaser Sprite Proof</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="game"></div>
  <div class="hud">
    <div class="hud-row"><b>Phaser 多動作驗證</b> · 顯示 sprite 與物理 actor 已分離</div>
    <div class="hud-row">WASD / 方向鍵移動 · 點地移動 · 1–6 動作 · 0 顯示錨點／碰撞體</div>
    <div class="controls" id="controls">
      <button class="action-btn" data-action="idle">1 Idle</button>
      <button class="action-btn" data-action="walk">2 Walk</button>
      <button class="action-btn" data-action="attack">3 Attack</button>
      <button class="action-btn" data-action="cast">4 Cast</button>
      <button class="action-btn" data-action="hurt">5 Hurt</button>
      <button class="action-btn" data-action="death">6 Death</button>
      <button class="action-btn" id="debug-toggle" type="button">0 Debug</button>
    </div>
    <div class="hud-row" id="asset-status">素材檢查中…</div>
    <div class="hud-row" id="status">loading…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="./config.js"></script>
  <script src="./scene.js"></script>
  <script src="./scene-controller.js"></script>
  <script src="./scene-assets.js"></script>
  <script src="./scene-effects.js"></script>
  <script src="./main.js"></script>
</body>
</html>
